<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier du Burger - Sondage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            max-width: 450px;
            margin: 40px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #4E342E;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            color: #4E342E;
            font-weight: bold;
        }

        .cadre-texte {
            border: 2px solid #4E342E;
            padding: 18px;
            border-radius: 10px;
            background-color: #fff8f3;
            margin-bottom: 25px;
        }

        .cadre-texte strong {
            color: #4E342E;
            font-size: 18px;
        }

        .cadre-texte span {
            color: #000;
            font-size: 17px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background-color: #4E342E;
            transition: 0.2s;
        }

        button:hover {
            background-color: #3b2722;
        }

        #adminPanel {
            display: none;
            margin-top: 20px;
        }

        #results {
            font-size: 18px;
            margin-top: 15px;
            color: #4E342E;
            font-weight: bold;
        }

        .reset-btn {
            background-color: #000;
        }

        .reset-btn:hover {
            background-color: #333;
        }

        hr {
            margin: 25px 0;
            border: none;
            border-top: 1px solid #4E342E;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>L'Atelier du Burger</h1>

        <div class="cadre-texte">
            <strong>Plusieurs clients nous demandent un Menu Kebab.</strong><br><br>
            <span>Comme il n’est pas encore dans notre carte, nous aimerions savoir ce que vous souhaitez que nous ajoutions.</span>
        </div>

        <button onclick="vote('oui')">Oui</button>
        <button onclick="vote('non')">Non</button>

        <div id="results"></div>

        <hr>

        <button onclick="adminLogin()">Espace Admin</button>

        <div id="adminPanel">
            <h3 style="color:#4E342E;">Résultats du sondage</h3>
            <p id="adminResults"></p>
            <button class="reset-btn" onclick="resetVotes()">Réinitialiser les votes</button>
        </div>

    </div>

<script>
    function vote(choice) {
        let votes = JSON.parse(localStorage.getItem("votes")) || {oui: 0, non: 0};
        votes[choice]++;
        localStorage.setItem("votes", JSON.stringify(votes));
        document.getElementById("results").innerHTML = "Merci pour votre réponse !";
    }

    function adminLogin() {
        let code = prompt("Entrez le code admin :");
        if (code === "1950") {
            document.getElementById("adminPanel").style.display = "block";
            showResults();
        } else {
            alert("Code incorrect.");
        }
    }

    function showResults() {
        let votes = JSON.parse(localStorage.getItem("votes")) || {oui: 0, non: 0};
        document.getElementById("adminResults").innerHTML =
            "Oui : " + votes.oui + "<br>Non : " + votes.non;
    }

    function resetVotes() {
        localStorage.setItem("votes", JSON.stringify({oui: 0, non: 0}));
        showResults();
    }
</script>

</body>
</html>
