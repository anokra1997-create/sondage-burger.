<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier du Burger - Sondage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
        }
        .question {
            font-size: 18px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #ffcc00;
        }
        #adminPanel {
            display: none;
            margin-top: 20px;
        }
        #results {
            font-size: 18px;
            margin-top: 15px;
        }
        .reset-btn {
            background-color: #e63946;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>L'Atelier du Burger</h1>

        <p class="question">
            <strong>Plusieurs clients nous demandent un Menu Kebab.<br>
            Comme il n’est pas encore dans notre carte, nous aimerions savoir ce que vous souhaitez que nous ajoutions.</strong>
        </p>

        <button onclick="vote('oui')">Oui</button>
        <button onclick="vote('non')">Non</button>

        <div id="results"></div>

        <hr>

        <button onclick="adminLogin()">Espace Admin</button>

        <div id="adminPanel">
            <h3>Résultats du sondage</h3>
            <p id="adminResults"></p>
            <button class="reset-btn" onclick="resetVotes()">Réinitialiser les votes</button>
        </div>

    </div>

<script>
    function vote(choice) {
        let votes = JSON.parse(localStorage.getItem("votes")) || {oui: 0, non: 0};
        votes[choice]++;
        localStorage.setItem("votes", JSON.stringify(votes));
        document.getElementById("results").innerHTML = "Merci pour votre réponse !";
    }

    function adminLogin() {
        let code = prompt("Entrez le code admin :");
        if (code === "1950") {
            document.getElementById("adminPanel").style.display = "block";
            showResults();
        } else {
            alert("Code incorrect.");
        }
    }

    function showResults() {
        let votes = JSON.parse(localStorage.getItem("votes")) || {oui: 0, non: 0};
        document.getElementById("adminResults").innerHTML =
            "Oui : " + votes.oui + "<br>Non : " + votes.non;
    }

    function resetVotes() {
        localStorage.setItem("votes", JSON.stringify({oui: 0, non: 0}));
        showResults();
    }
</script>

</body>
</html>
